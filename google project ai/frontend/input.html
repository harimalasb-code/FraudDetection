<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Single Check - FraudShield AI</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="bg-animation"></div>

    <nav>
        <a href="index.html" class="logo">
            <i class="fa-solid fa-shield-halved"></i> FraudShield AI
        </a>
        <div class="nav-links">
            <a href="dashboard.html">Dashboard</a>
            <a href="input.html" style="color: var(--neon-cyan); text-shadow: 0 0 8px var(--neon-cyan);">Single Check</a>
        </div>
    </nav>

    <div class="container" style="display: flex; justify-content: center; align-items: center; min-height: 80vh;">
        <div class="glass-panel" style="width: 100%; max-width: 500px; padding: 2.5rem;">
            <h2 style="margin-bottom: 2rem; text-align: center; font-family: 'Space Grotesk', sans-serif;">Analyze Transaction</h2>
            
            <form id="predictionForm">
                <div class="form-group">
                    <label>Amount ($)</label>
                    <input type="number" step="0.01" id="amount" class="form-control" required placeholder="e.g. 150.50">
                </div>
                
                <div class="form-group">
                    <label>Location</label>
                    <select id="location" class="form-control" required>
                        <option value="New York">New York</option>
                        <option value="London">London</option>
                        <option value="Paris">Paris</option>
                        <option value="Tokyo">Tokyo</option>
                        <option value="Sydney">Sydney</option>
                        <option value="Mumbai">Mumbai</option>
                        <option value="Dubai">Dubai</option>
                        <option value="Toronto">Toronto</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Device Type</label>
                    <select id="device" class="form-control" required>
                        <option value="Desktop">Desktop</option>
                        <option value="Mobile">Mobile</option>
                        <option value="Tablet">Tablet</option>
                        <option value="Unknown">Unknown</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Time of Day (Hour: 0-23)</label>
                    <input type="number" min="0" max="23" id="time" class="form-control" required placeholder="e.g. 14 for 2 PM">
                </div>
                
                <button type="submit" class="btn-gradient" style="width: 100%; margin-top: 1rem;">
                    Run AI Analysis <i class="fa-solid fa-microchip" style="margin-left: 8px;"></i>
                </button>
            </form>
        </div>
    </div>

    <!-- Full-screen loader -->
    <div id="loader">
        <div class="spinner"></div>
        <div class="loader-text">🤖 Analyzing Transaction...</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
